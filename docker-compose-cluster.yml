version: '3'

services:
  redis-node-1:
    image: redis:7
    container_name: redis-node-1
    command: redis-server --port 6380 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --cluster-announce-ip 127.0.0.1 --cluster-announce-port 6380
    ports:
      - "6380:6380"
      - "16380:16380"

  redis-node-2:
    image: redis:7
    container_name: redis-node-2
    command: redis-server --port 6381 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --cluster-announce-ip 127.0.0.1 --cluster-announce-port 6381
    ports:
      - "6381:6381"
      - "16381:16381"

  redis-node-3:
    image: redis:7
    container_name: redis-node-3
    command: redis-server --port 6382 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --cluster-announce-ip 127.0.0.1 --cluster-announce-port 6382
    ports:
      - "6382:6382"
      - "16382:16382"
