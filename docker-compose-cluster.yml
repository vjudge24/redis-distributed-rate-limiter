version: '3'

services:
  redis-cluster:
    image: redis:7
    container_name: redis-cluster
    ports:
      - "6380:6380"
      - "6381:6381"
      - "6382:6382"
      - "16380:16380"
      - "16381:16381"
      - "16382:16382"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start 3 Redis instances in the same container
        redis-server --port 6380 --cluster-enabled yes --cluster-config-file /data/nodes-6380.conf --cluster-node-timeout 5000 --appendonly yes --cluster-announce-ip 127.0.0.1 --cluster-announce-port 6380 --cluster-announce-bus-port 16380 --daemonize yes
        redis-server --port 6381 --cluster-enabled yes --cluster-config-file /data/nodes-6381.conf --cluster-node-timeout 5000 --appendonly yes --cluster-announce-ip 127.0.0.1 --cluster-announce-port 6381 --cluster-announce-bus-port 16381 --daemonize yes
        redis-server --port 6382 --cluster-enabled yes --cluster-config-file /data/nodes-6382.conf --cluster-node-timeout 5000 --appendonly yes --cluster-announce-ip 127.0.0.1 --cluster-announce-port 6382 --cluster-announce-bus-port 16382 --daemonize yes
        sleep 2
        echo "yes" | redis-cli --cluster create 127.0.0.1:6380 127.0.0.1:6381 127.0.0.1:6382
        echo "Redis cluster created successfully"
        # Keep container running
        tail -f /dev/null